<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Turbo Operations Center - Overview</title>
    <link rel="stylesheet" href="/assets/DashboardPage.css" />
</head>
<body data-section="overview">
    <main class="layout">
        <header class="topbar">
            <div class="topbar-brand">
                <h1>Turbo Operations Center</h1>
                <p>Read-only observability dashboard</p>
            </div>
            <div class="topbar-status-wrap">
                <span id="globalStatus" class="topbar-status">Not connected</span>
                <span id="globalView" class="topbar-status">Current view: Overview</span>
            </div>
        </header>

        <div class="dashboard-shell">
            <nav class="section-nav" data-dashboard-nav aria-label="Sections"></nav>

            <section class="view is-active">
                <section class="panel">
                    <div class="panel-head">
                        <h2>Overview</h2>
                        <button id="refreshOverview" type="button">Refresh</button>
                    </div>
                    <section class="card-grid" id="overviewCards"></section>
                </section>
            </section>
        </div>
    </main>

    <script src="/assets/DashboardPage.js" defer></script>
    <script src="/assets/DashboardOverviewPage.js" defer></script>
</body>
</html>
