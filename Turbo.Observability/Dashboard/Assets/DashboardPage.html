<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Turbo Operations Center</title>
    <link rel="stylesheet" href="/assets/dashboard.css" />
</head>
<body>
    <main class="layout">
        <header class="topbar">
            <div class="topbar-brand">
                <h1>Turbo Operations Center</h1>
                <p>Read-only observability dashboard</p>
            </div>
            <span id="globalStatus" class="topbar-status">Not connected</span>
        </header>

        <section class="card-grid" id="overviewCards"></section>

        <section class="panel">
            <h2>Search</h2>
            <form id="searchForm" class="search-form" autocomplete="off">
                <label for="queryInput" class="sr-only">Search by player id, item id or correlation id</label>
                <input id="queryInput" name="q" type="text" placeholder="player id / item id / correlation id" />
                <button type="submit">Search</button>
            </form>
            <pre id="searchResult" class="codeblock">No search run yet.</pre>
        </section>

        <section class="panel">
            <div class="panel-head">
                <h2>Recent audit events</h2>
                <button id="refreshAudit" type="button">Refresh</button>
            </div>
            <div id="auditLoading" class="muted">Loading latest audit events...</div>
            <table aria-live="polite">
                <thead>
                    <tr>
                        <th>time</th>
                        <th>category</th>
                        <th>action</th>
                        <th>actor</th>
                        <th>target</th>
                        <th>result</th>
                        <th>cid</th>
                    </tr>
                </thead>
                <tbody id="auditRows"></tbody>
            </table>
        </section>
    </main>

    <script src="/assets/dashboard.js" defer></script>
</body>
</html>
