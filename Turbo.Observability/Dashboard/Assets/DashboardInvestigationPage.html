<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Turbo Operations Center - Investigation</title>
    <link rel="stylesheet" href="/assets/DashboardPage.css" />
</head>
<body data-section="investigation">
    <main class="layout">
        <header class="topbar">
            <div class="topbar-brand">
                <h1>Turbo Operations Center</h1>
                <p>Read-only observability dashboard</p>
            </div>
            <div class="topbar-status-wrap">
                <span id="globalStatus" class="topbar-status">Not connected</span>
                <span id="globalView" class="topbar-status">Current view: Investigation</span>
            </div>
        </header>

        <div class="dashboard-shell">
            <nav class="section-nav" data-dashboard-nav aria-label="Sections"></nav>

            <section class="view is-active">
                <section class="panel">
                    <h2>Player timeline / search</h2>
                    <form id="searchForm" class="search-form" autocomplete="off">
                        <label for="queryInput" class="sr-only">Search by player id, item id or correlation id</label>
                        <input id="queryInput" name="q" type="text" placeholder="player id / item id / correlation id" />
                        <button type="submit">Search</button>
                    </form>
                    <p id="playerTimelineState" class="muted">Use a player id for a structured timeline, or a correlation id for raw view.</p>
                    <div class="compact-table">
                        <table>
                            <thead>
                                <tr>
                                    <th>time</th>
                                    <th>type</th>
                                    <th>actor</th>
                                    <th>details</th>
                                </tr>
                            </thead>
                            <tbody id="playerTimelineRows"></tbody>
                        </table>
                    </div>
                    <p id="playerTimelineEmpty" class="muted">No player timeline loaded.</p>
                    <pre id="searchResult" class="codeblock">No search run yet.</pre>
                </section>
            </section>
        </div>
    </main>

    <script src="/assets/DashboardPage.js" defer></script>
    <script src="/assets/DashboardInvestigationPage.js" defer></script>
</body>
</html>
