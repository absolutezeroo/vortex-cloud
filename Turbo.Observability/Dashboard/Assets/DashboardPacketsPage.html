<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Turbo Operations Center - Packet Center</title>
    <link rel="stylesheet" href="/assets/DashboardPage.css" />
</head>
<body data-section="packets">
    <main class="layout">
        <header class="topbar">
            <div class="topbar-brand">
                <h1>Turbo Operations Center</h1>
                <p>Read-only observability dashboard</p>
            </div>
            <div class="topbar-status-wrap">
                <span id="globalStatus" class="topbar-status">Not connected</span>
                <span id="globalView" class="topbar-status">Current view: Packet center</span>
            </div>
        </header>

        <div class="dashboard-shell">
            <nav class="section-nav" data-dashboard-nav aria-label="Sections"></nav>

            <section class="view is-active">
                <section class="panel">
                    <div class="panel-head">
                        <h2>Packet center</h2>
                        <button id="refreshPackets" type="button">Refresh</button>
                    </div>
                    <div id="packetCards" class="card-grid card-grid--small"></div>
                    <div id="packetOverview" class="muted"></div>
                    <h3>Top packet operations</h3>
                    <div class="compact-table">
                        <table id="packetTopOperations">
                            <thead>
                                <tr>
                                    <th>operation</th>
                                    <th>packets/min</th>
                                </tr>
                            </thead>
                            <tbody id="packetTopOperationsRows"></tbody>
                        </table>
                    </div>
                    <h3>Top failed operations</h3>
                    <div class="compact-table">
                        <table id="packetTopFailedOperations">
                            <thead>
                                <tr>
                                    <th>operation</th>
                                    <th>packets/min</th>
                                </tr>
                            </thead>
                            <tbody id="packetTopFailedRows"></tbody>
                        </table>
                    </div>
                </section>
            </section>
        </div>
    </main>

    <script src="/assets/DashboardPage.js" defer></script>
    <script src="/assets/DashboardPacketsPage.js" defer></script>
</body>
</html>
