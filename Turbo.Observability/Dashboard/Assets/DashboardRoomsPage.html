<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Turbo Operations Center - Room Inspector</title>
    <link rel="stylesheet" href="/assets/DashboardPage.css" />
</head>
<body data-section="rooms">
    <main class="layout">
        <header class="topbar">
            <div class="topbar-brand">
                <h1>Turbo Operations Center</h1>
                <p>Read-only observability dashboard</p>
            </div>
            <div class="topbar-status-wrap">
                <span id="globalStatus" class="topbar-status">Not connected</span>
                <span id="globalView" class="topbar-status">Current view: Room inspector</span>
            </div>
        </header>

        <div class="dashboard-shell">
            <nav class="section-nav" data-dashboard-nav aria-label="Sections"></nav>

            <section class="view is-active">
                <section class="panel">
                    <div class="panel-head">
                        <h2>Room inspector</h2>
                        <button id="refreshRoomTimeline" type="button">Refresh</button>
                    </div>
                    <form id="roomTimelineForm" class="search-form" autocomplete="off">
                        <label for="roomTimelineInput" class="sr-only">Room id for timeline</label>
                        <input id="roomTimelineInput" type="number" min="1" placeholder="room id" />
                        <button type="submit">Load room timeline</button>
                    </form>
                    <p id="roomTimelineMeta" class="muted">Pick a room id to inspect entries and chat.</p>
                    <div class="compact-table">
                        <table>
                            <thead>
                                <tr>
                                    <th>time</th>
                                    <th>event</th>
                                    <th>actor</th>
                                    <th>target</th>
                                    <th>message</th>
                                </tr>
                            </thead>
                            <tbody id="roomTimelineRows"></tbody>
                        </table>
                    </div>
                    <p id="roomTimelineEmpty" class="muted">No room timeline loaded.</p>
                </section>
            </section>
        </div>
    </main>

    <script src="/assets/DashboardPage.js" defer></script>
    <script src="/assets/DashboardRoomsPage.js" defer></script>
</body>
</html>
